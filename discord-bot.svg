<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1f3a"/>
      <stop offset="1" stop-color="#0f1024"/>
    </linearGradient>
    <linearGradient id="blurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C83FF"/>
      <stop offset="1" stop-color="#5865F2"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="120" cy="90" r="120" fill="#5865F2" opacity="0.18" filter="url(#soft)"/>
  <circle cx="690" cy="410" r="140" fill="#7C83FF" opacity="0.15" filter="url(#soft)"/>

  <!-- chat bubbles -->
  <g opacity="0.9">
    <rect x="70" y="150" rx="16" width="200" height="46" fill="#2a2c52"/>
    <rect x="90" y="168" rx="6" width="120" height="10" fill="#4b4f86"/>
    <rect x="70" y="212" rx="16" width="150" height="40" fill="#2a2c52"/>
    <rect x="90" y="228" rx="6" width="80" height="9" fill="#4b4f86"/>
  </g>
  <g opacity="0.95">
    <rect x="530" y="290" rx="16" width="200" height="46" fill="url(#blurple)"/>
    <rect x="552" y="308" rx="6" width="120" height="10" fill="#ffffff" opacity="0.75"/>
  </g>

  <!-- bot -->
  <g transform="translate(400,250)">
    <rect x="-95" y="-70" rx="34" width="190" height="150" fill="url(#blurple)"/>
    <rect x="-95" y="-70" rx="34" width="190" height="150" fill="#ffffff" opacity="0.04"/>
    <circle cx="-38" cy="-2" r="20" fill="#0f1024"/>
    <circle cx="38" cy="-2" r="20" fill="#0f1024"/>
    <circle cx="-38" cy="-2" r="8" fill="#8b93ff"/>
    <circle cx="38" cy="-2" r="8" fill="#8b93ff"/>
    <rect x="-30" y="40" rx="6" width="60" height="10" fill="#0f1024" opacity="0.5"/>
    <line x1="0" y1="-70" x2="0" y2="-100" stroke="#7C83FF" stroke-width="5"/>
    <circle cx="0" cy="-106" r="9" fill="#34D399"/>
  </g>

  <text x="400" y="440" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="26" font-weight="700" fill="#ECEAF3">Discord Bot</text>
  <text x="400" y="468" text-anchor="middle" font-family="monospace" font-size="14" fill="#9A97AD">automation · moderation · commands</text>
</svg>
