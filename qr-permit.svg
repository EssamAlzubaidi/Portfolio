<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e2230"/>
      <stop offset="1" stop-color="#08131c"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="140" cy="90" r="130" fill="#22D3EE" opacity="0.12" filter="url(#soft)"/>
  <circle cx="680" cy="420" r="150" fill="#0EA5E9" opacity="0.12" filter="url(#soft)"/>

  <!-- QR code (stylized) -->
  <g transform="translate(300,120)">
    <rect x="-14" y="-14" width="228" height="228" rx="20" fill="#0b1a24" stroke="url(#cyan)" stroke-width="2"/>
    <!-- finder patterns -->
    <g fill="#e8f6fb">
      <rect x="10" y="10" width="52" height="52" rx="6"/><rect x="20" y="20" width="32" height="32" rx="3" fill="#0b1a24"/><rect x="28" y="28" width="16" height="16" fill="url(#cyan)"/>
      <rect x="138" y="10" width="52" height="52" rx="6"/><rect x="148" y="20" width="32" height="32" rx="3" fill="#0b1a24"/><rect x="156" y="28" width="16" height="16" fill="url(#cyan)"/>
      <rect x="10" y="138" width="52" height="52" rx="6"/><rect x="20" y="148" width="32" height="32" rx="3" fill="#0b1a24"/><rect x="28" y="156" width="16" height="16" fill="url(#cyan)"/>
    </g>
    <!-- data modules -->
    <g fill="#9fdbe9">
      <rect x="78" y="14" width="14" height="14"/><rect x="106" y="14" width="14" height="14"/><rect x="78" y="42" width="14" height="14"/><rect x="120" y="42" width="14" height="14"/>
      <rect x="14" y="78" width="14" height="14"/><rect x="42" y="78" width="14" height="14"/><rect x="78" y="78" width="14" height="14"/><rect x="106" y="78" width="14" height="14"/><rect x="148" y="78" width="14" height="14"/><rect x="176" y="78" width="14" height="14"/>
      <rect x="28" y="106" width="14" height="14"/><rect x="78" y="106" width="14" height="14"/><rect x="120" y="106" width="14" height="14"/><rect x="162" y="106" width="14" height="14"/>
      <rect x="78" y="138" width="14" height="14"/><rect x="106" y="138" width="14" height="14"/><rect x="148" y="138" width="14" height="14"/>
      <rect x="78" y="166" width="14" height="14" fill="url(#cyan)"/><rect x="120" y="166" width="14" height="14"/><rect x="162" y="166" width="14" height="14"/>
      <rect x="106" y="176" width="14" height="14"/><rect x="148" y="190" width="14" height="14" fill="url(#cyan)"/>
    </g>
    <!-- scan line -->
    <rect x="-14" y="96" width="228" height="4" fill="#22D3EE" opacity="0.85"/>
  </g>

  <!-- shield check badge -->
  <g transform="translate(560,300)">
    <path d="M0 -46 L40 -30 V6 C40 34 0 52 0 52 C0 52 -40 34 -40 6 V-30 Z" fill="url(#cyan)" opacity="0.95"/>
    <path d="M-16 4 L-4 16 L18 -10" fill="none" stroke="#05131b" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="400" y="452" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="26" font-weight="700" fill="#e8f6fb">Material Exit Permit System</text>
  <text x="400" y="480" text-anchor="middle" font-family="monospace" font-size="14" fill="#7fb6c9">QR verification · approvals · audit trail</text>
</svg>
